name: 💓 Profit Heartbeat

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Send Heartbeat to Telegram
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=💓 Profit Heartbeat - System Alive - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        continue-on-error: true
      
      - name: Update Status File
        run: |
          echo "{\"last_heartbeat\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"status\": \"alive\"}" > heartbeat.json
      
      - name: Commit Status
        run: |
          git config --local user.email "profit-bot@github.com"
          git config --local user.name "Profit Bot"
          git add heartbeat.json
          git commit -m "💓 Heartbeat $(date -u +%Y-%m-%dT%H:%M)" || echo "No changes to commit"
          git push
        continue-on-error: true
